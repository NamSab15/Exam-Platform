services:
  db:
    image: postgres:17-alpine
    container_name: xebia_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: xebia_exam_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d xebia_exam_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrations:
    image: registry.gitlab.com/xebia-exam-platform/group-a/team-4:stable
    container_name: xebia_migrations
    command: python /shared/infra/db/migrate.py
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/xebia_exam_db
    volumes:
      - ./infra/db:/shared/infra/db
    depends_on:
      db:
        condition: service_healthy

  accounts:
    image: registry.gitlab.com/xebia-exam-platform/group-a/team-1:stable
    container_name: xebia_accounts
    ports:
      - "8001:8000"
    environment:
      ENV: production
      LOG_LEVEL: INFO
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/xebia_exam_db
    depends_on:
      db:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully

  questions:
    image: registry.gitlab.com/xebia-exam-platform/group-a/team-2:stable
    container_name: xebia_questions
    ports:
      - "8002:8000"
    environment:
      ENV: production
      LOG_LEVEL: INFO
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/xebia_exam_db
    depends_on:
      db:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully

  exams:
    image: registry.gitlab.com/xebia-exam-platform/group-a/team-3:stable
    container_name: xebia_exams
    ports:
      - "8003:8000"
    environment:
      ENV: production
      LOG_LEVEL: INFO
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/xebia_exam_db
    depends_on:
      db:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully

  proctoring:
    image: registry.gitlab.com/xebia-exam-platform/group-a/team-4:stable
    container_name: xebia_proctoring
    ports:
      - "8004:8000"
    environment:
      ENV: production
      LOG_LEVEL: INFO
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/xebia_exam_db
    depends_on:
      db:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully

  # TODO: Notification Service
  # A shared notification service (email, in-app alerts, webhook dispatching) is
  # planned for a future milestone. It will be implemented as a separate microservice
  # and registered here once the service contract and GitLab repo are established.
  # notifications:
  #   image: registry.gitlab.com/xebia-exam-platform/group-a/notifications:stable
  #   container_name: xebia_notifications
  #   ports:
  #     - "8005:8000"
  #   environment:
  #     ENV: production
  #     DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/xebia_exam_db
  #   depends_on:
  #     db:
  #       condition: service_healthy
  #     migrations:
  #       condition: service_completed_successfully

volumes:
  postgres_data:
