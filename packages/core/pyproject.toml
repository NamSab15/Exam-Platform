[project]
name = "xebia-core"
version = "0.1.0"
description = "Xebia Exam Platform - shared configuration, logging, and database utilities"
requires-python = ">=3.12"
dependencies = [
    "structlog>=24.4.0",
    "pydantic-settings>=2.5.0",
    "sqlmodel>=0.0.21",
    "asyncpg>=0.30.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/xebia_core"]
