stages:
  - validate
  - build
  - deploy

default:
  image: node:20-slim
  before_script:
    - corepack enable
    - corepack prepare pnpm@latest-9 --activate
    - pnpm config set store-dir .pnpm-store
    - cd frontend
    - pnpm install --frozen-lockfile

cache:
  key:
    files:
      - frontend/pnpm-lock.yaml
  paths:
    - frontend/.pnpm-store/

frontend:lint:
  stage: validate
  script:
    - pnpm lint

frontend:typecheck:
  stage: validate
  script:
    - pnpm exec tsc --noEmit

frontend:build:
  stage: build
  script:
    - pnpm build
  artifacts:
    name: "frontend-build-$CI_COMMIT_REF_SLUG"
    paths:
      - frontend/out/
    expire_in: 1 week

get_secrets:
  stage: deploy
  image: mcr.microsoft.com/azure-cli:latest
  before_script:
    - az login --service-principal -u "$AZURE_CLIENT_ID" -p "$AZURE_CLIENT_SECRET" --tenant "$AZURE_TENANT_ID"
  script:
    - SWA_TOKEN=$(az staticwebapp secrets list --name "swa-xebia-exam-frontend" --resource-group "rg-xebia-exam-prod" --query "properties.apiKey" -o tsv)
    - echo "SWA_DEPLOYMENT_TOKEN=$SWA_TOKEN" > deploy.env
  artifacts:
    reports:
      dotenv: deploy.env
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

frontend:deploy:
  stage: deploy
  image: node:20-slim
  dependencies:
    - frontend:build
  needs:
    - get_secrets
    - frontend:build
  before_script: [] # Override global before_script
  script:
    - cd frontend
    - npx @azure/static-web-apps-cli deploy ./out --deployment-token "$SWA_DEPLOYMENT_TOKEN" --env production
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
