stages:
  - validate
  - build
  - deploy

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "parent_pipeline"

default:
  image: node:22-alpine
  before_script:
    - apk add --no-cache libc6-compat
    - corepack enable
    - corepack prepare pnpm@latest-9 --activate
    - pnpm config set store-dir .pnpm-store
    - cd frontend
    - pnpm install --frozen-lockfile --ignore-scripts

cache:
  key:
    files:
      - frontend/pnpm-lock.yaml
  paths:
    - frontend/.pnpm-store/

frontend:lint:
  stage: validate
  script:
    - pnpm lint

frontend:typecheck:
  stage: validate
  script:
    - pnpm exec tsc --noEmit

frontend:build:
  stage: build
  script:
    - pnpm build

frontend:deploy:
  stage: deploy
  image: mcr.microsoft.com/azure-cli:latest
  before_script: []
  cache: {}
  script:
    - az login --service-principal -u "$AZURE_CLIENT_ID" -p "$AZURE_CLIENT_SECRET" --tenant "$AZURE_TENANT_ID"
    # Build the container using Azure Container Registry Tasks (no dind needed)
    - az acr build --registry acrxebiaexamshared --image frontend:$CI_COMMIT_SHORT_SHA ./frontend
    # Deploy the new image to Azure Container App
    - az containerapp update --name ca-xebia-exam-frontend --resource-group rg-xebia-exam-prod --image acrxebiaexamshared.azurecr.io/frontend:$CI_COMMIT_SHORT_SHA
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
