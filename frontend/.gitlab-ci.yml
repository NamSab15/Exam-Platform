stages:
  - validate
  - build
  - deploy

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "parent_pipeline"

default:
  image: node:22-alpine
  before_script:
    - apk add --no-cache libc6-compat
    - corepack enable
    - corepack prepare pnpm@latest-9 --activate
    - pnpm config set store-dir .pnpm-store
    - cd frontend
    - pnpm install --frozen-lockfile --ignore-scripts

cache:
  key:
    files:
      - frontend/pnpm-lock.yaml
  paths:
    - frontend/.pnpm-store/

frontend:lint:
  stage: validate
  script:
    - pnpm lint

frontend:typecheck:
  stage: validate
  script:
    - pnpm exec tsc --noEmit

frontend:build:
  stage: build
  script:
    - pnpm build

frontend:deploy:
  stage: deploy
  image: mcr.microsoft.com/azure-cli:latest
  services:
    - docker:24.0.5-dind
  variables:
    DOCKER_HOST: tcp://docker:2376
    DOCKER_TLS_VERIFY: 1
    DOCKER_CERT_PATH: "/certs/client"
  before_script:
    - apk add --no-cache docker-cli
  cache: {}
  script:
    - az login --service-principal -u "$AZURE_CLIENT_ID" -p "$AZURE_CLIENT_SECRET" --tenant "$AZURE_TENANT_ID"
    - az acr login --name acrxebiaexamshared
    - docker build -t acrxebiaexamshared.azurecr.io/frontend:$CI_COMMIT_SHORT_SHA ./frontend
    - docker push acrxebiaexamshared.azurecr.io/frontend:$CI_COMMIT_SHORT_SHA
    - az containerapp update --name ca-xebia-exam-frontend --resource-group rg-xebia-exam-prod --image acrxebiaexamshared.azurecr.io/frontend:$CI_COMMIT_SHORT_SHA
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
